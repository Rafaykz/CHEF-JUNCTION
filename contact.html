<section class="event-form-section py-5">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-12 col-md-10 col-lg-8">

                <form
                    action="thanks.html"
                    method="get"
                    class="event-form"
                >

                    <div class="row g-3">

                        <!-- Heading -->
                        <div class="col-12">

                            <h2 class="event-form-title mb-4">
                                Tell us about your event!
                            </h2>

                        </div>


                        <!-- Name -->
                        <div class="col-12 col-md-6">

                            <input
                                type="text"
                                name="name"
                                class="form-control event-form-input"
                                placeholder="Name"
                                maxlength="100"
                                autocomplete="off"
                            >

                        </div>


                        <!-- Email -->
                        <div class="col-12 col-md-6">

                            <input
                                type="email"
                                name="email"
                                class="form-control event-form-input"
                                placeholder="Email"
                                maxlength="250"
                                autocomplete="off"
                                required
                            >

                        </div>


                        <!-- Phone -->
                        <div class="col-12 col-md-6">

                            <input
                                type="tel"
                                name="phone"
                                class="form-control event-form-input"
                                placeholder="Phone"
                                maxlength="50"
                                autocomplete="off"
                            >

                        </div>


                        <!-- Company -->
                        <div class="col-12 col-md-6">

                            <input
                                type="text"
                                name="company"
                                class="form-control event-form-input"
                                placeholder="Company"
                                maxlength="100"
                                autocomplete="off"
                            >

                        </div>


                        <!-- Second Phone -->
                        <div class="col-12 col-md-6">

                            <input
                                type="tel"
                                name="company_phone"
                                class="form-control event-form-input"
                                placeholder="Phone"
                                maxlength="50"
                                autocomplete="off"
                            >

                        </div>


                        <!-- Event Date -->
                        <div class="col-12 col-md-6">

                            <input
                                type="date"
                                name="event_date"
                                class="form-control event-form-input"
                                aria-label="Select a date For Event"
                            >

                        </div>


                        <!-- Number of People -->
                        <div class="col-12">

                            <input
                                type="number"
                                name="number_of_people"
                                class="form-control event-form-input"
                                placeholder="Number of People"
                                min="1"
                            >

                        </div>


                        <!-- Event Details -->
                        <div class="col-12">

                            <textarea
                                name="event_details"
                                class="form-control event-form-input event-details"
                                placeholder="Type Of Event/ Details"
                            ></textarea>

                        </div>


                        <!-- Submit Button -->
                        <div class="col-12 text-center">

                            <button
                                type="submit"
                                class="btn event-submit-btn"
                            >
                                Submit
                            </button>

                        </div>


                        <!-- Submission Message -->
                        <div class="col-12">

                            <p class="event-submit-message mb-0">
                                Thanks for submitting!
                            </p>

                        </div>

                    </div>

                </form>

            </div>

        </div>

    </div>

</section>
